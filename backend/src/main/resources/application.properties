server.port=${PORT:8080}
server.address=0.0.0.0
spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:jdbc:h2:mem:kings_tv_db;DB_CLOSE_DELAY=-1;MODE=MySQL}}
spring.datasource.username=${DB_USER:${SPRING_DATASOURCE_USERNAME:sa}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

jwt.secret=${JWT_SECRET:super_secret_kings_tv_token_key_1234_long_string_required_for_spring_boot_security}
cors.allowed-origins=${ALLOWED_ORIGINS:https://kings-tv.vercel.app,http://localhost:5173,http://localhost:5174,http://172.20.10.5:5173}

# File upload size limits (default is 1MB which causes upload failures for photos/videos)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.enabled=true

# Ensure responses and file names are handled as UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Swagger/OpenAPI Documentation Config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
